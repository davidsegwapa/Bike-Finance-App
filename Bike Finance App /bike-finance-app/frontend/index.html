<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bike Finance Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>📆 <span id="current-date"></span></h1>
    <h2>🚴 Bike Finance Dashboard</h2>
  </header>

  <main>
    <section id="dashboard">
      <h3>💰 Total Money: R<span id="total-money">0</span></h3>
      <h3>🚲 Active Bikes: <span id="active-bikes">0</span></h3>
      <h3>🛒 Can Buy New Bike: <span id="can-buy">No</span></h3>
      <button onclick="adjustMoney('add')">➕ Add Money</button>
      <button onclick="adjustMoney('subtract')">➖ Subtract Money</button>
    </section>

    <section id="bike-list">
      <h3>📋 All Bikes</h3>
      <div id="bikes-container">
        <!-- Bikes will appear here dynamically -->
      </div>
      <button onclick="openAddBikeForm()">➕ Add New Bike</button>
    </section>

    <section id="add-bike-form" style="display: none;">
      <h3>Add a New Bike</h3>
      <form onsubmit="addBike(event)">
        <input type="text" id="bike-name" placeholder="Bike Name/ID" required />
        <input type="number" id="monthly-income" placeholder="Monthly Income (max R2500)" required />
        <input type="number" id="dashboard-cut" placeholder="Amount to Dashboard" required />
        <input type="text" id="driver-name" placeholder="Driver Name" required />
        <button type="submit">Add Bike</button>
      </form>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
